<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밴드부 합주 시간 투표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);--accent-text:#1a1e00;--green:#4cff91;--green-dim:rgba(76,255,145,0.1);--red:#ff5c5c;--red-dim:rgba(255,92,92,0.1);--radius:10px;--radius-lg:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .container{max-width:720px;margin:0 auto;padding:0 16px 80px;}
  header{padding:36px 0 24px;border-bottom:0.5px solid var(--border);margin-bottom:24px;}
  .header-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
  header h1{font-size:24px;font-weight:700;letter-spacing:-.02em;}
  header p{font-size:13px;color:var(--text2);margin-top:5px;}

  /* 카드 */
  .card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;}
  .card-title{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .card-sub{font-size:13px;color:var(--text2);margin-bottom:16px;}
  .step-badge{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--accent-dim);color:var(--accent);}

  /* 버튼 */
  .btn{padding:10px 18px;border-radius:var(--radius);font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s;}
  .btn:hover{background:var(--bg4);}
  .btn-accent{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:700;}
  .btn-accent:hover{background:#d4eb30;}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .btn-danger{background:var(--red-dim);color:var(--red);border-color:rgba(255,92,92,.2);}
  .btn-danger:hover{background:rgba(255,92,92,.18);}

  /* 입력 */
  input[type=text],select{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;padding:10px 14px;outline:none;transition:border-color .15s;width:100%;}
  input[type=text]:focus,select:focus{border-color:var(--accent);}
  input[type=text]::placeholder{color:var(--text3);}
  select option{background:var(--bg3);color:var(--text);}

  /* 체크박스 */
  .checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .15s;margin-bottom:6px;}
  .checkbox-row:hover{border-color:var(--border2);}
  .checkbox-row.checked{border-color:rgba(76,255,145,.3);background:var(--green-dim);}
  .checkbox-row.checked-red{border-color:rgba(255,92,92,.3);background:var(--red-dim);}
  .cb-box{width:18px;height:18px;border:0.5px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
  .checked .cb-box{background:var(--green);border-color:var(--green);color:var(--accent-text);}
  .checked-red .cb-box{background:var(--red);border-color:var(--red);color:#fff;}
  .cb-label{font-size:14px;font-weight:500;}

  /* 요일 그리드 */
  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}
  .day-btn{padding:10px 4px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;text-align:center;font-family:'Noto Sans KR',sans-serif;}
  .day-btn:hover{background:var(--bg4);}
  .day-btn.impossible{background:var(--red-dim);color:var(--red);border-color:rgba(255,92,92,.3);}
  .day-btn.possible{background:var(--green-dim);color:var(--green);border-color:rgba(76,255,145,.3);}

  /* 시간 슬롯 */
  .time-slot-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .time-slot{display:flex;align-items:center;gap:8px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
  .time-slot select{width:auto;flex:1;padding:6px 10px;font-size:13px;}
  .time-slot-sep{font-size:13px;color:var(--text2);flex-shrink:0;}
  .time-slot-day{font-size:13px;font-weight:500;min-width:28px;color:var(--accent);}

  /* 곡 태그 */
  .song-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .song-chip{font-size:13px;padding:6px 14px;border-radius:99px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
  .song-chip:hover{background:var(--bg4);}
  .song-chip.selected{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,255,71,.3);}

  /* 상단바 */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:12px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);}
  .user-pill{display:flex;align-items:center;gap:10px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:6px;transition:background .3s;}
  .sync-dot.live{background:var(--green);}
  .admin-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--accent-dim);color:var(--accent);font-family:'DM Mono',monospace;margin-left:6px;}
  .far-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--red-dim);color:var(--red);border:0.5px solid rgba(255,92,92,.2);margin-left:4px;}

  /* 진행 바 */
  .progress-wrap{margin-bottom:24px;}
  .progress-steps{display:flex;gap:4px;margin-bottom:8px;}
  .progress-step{flex:1;height:3px;border-radius:99px;background:var(--bg3);transition:background .3s;}
  .progress-step.done{background:var(--accent);}
  .progress-step.active{background:rgba(232,255,71,.4);}
  .progress-label{font-size:12px;color:var(--text2);}

  /* 집부 모드 */
  .admin-section{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
  .admin-section h3{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:500;}
  .add-row{display:flex;gap:8px;margin-bottom:8px;}
  .add-row input{flex:1;}

  /* 집부 현황 */
  .member-status-grid{display:flex;flex-direction:column;gap:6px;}
  .member-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);background:var(--bg3);}
  .member-name{font-size:13px;font-weight:500;min-width:60px;}
  .member-name.done{color:var(--green);}
  .member-name.undone{color:var(--red);}
  .member-songs{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
  .member-song-tag{font-size:11px;padding:2px 8px;border-radius:99px;}
  .member-song-tag.done{background:var(--green-dim);color:var(--green);}
  .member-song-tag.undone{background:var(--red-dim);color:var(--red);}
  .far-tag{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--red-dim);color:var(--red);border:0.5px solid rgba(255,92,92,.2);margin-left:4px;}

  /* 합주 시간표 */
  .schedule-wrap{margin-top:16px;}
  .schedule-day{margin-bottom:20px;}
  .schedule-day-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .schedule-slot{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius);margin-bottom:6px;border-left:3px solid var(--accent);}
  .schedule-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);min-width:110px;}
  .schedule-song{font-size:13px;font-weight:500;}
  .schedule-members{font-size:12px;color:var(--text2);}

  /* 시간표 카드 */
  .timetable-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
  .timetable-card.recommended{border-color:rgba(232,255,71,.3);background:linear-gradient(135deg,rgba(232,255,71,.04),rgba(76,255,145,.03));}
  .timetable-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .timetable-title{font-size:14px;font-weight:600;}
  .recommend-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--accent);color:var(--accent-text);font-weight:700;}
  .save-img-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .save-img-btn:hover{background:var(--bg4);color:var(--text);}

  /* 완료 화면 */
  .done-card{background:var(--bg2);border:0.5px solid rgba(76,255,145,.2);border-radius:var(--radius-lg);padding:36px 32px;max-width:440px;margin:40px auto;text-align:center;}
  .done-card h2{font-size:18px;font-weight:600;margin-bottom:12px;}
  .done-card p{font-size:14px;color:var(--text2);line-height:1.8;}

  /* 세션 입력 */
  .session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
  .session-slot{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;}
  .session-slot-name{font-size:12px;color:var(--text2);margin-bottom:6px;}
  .session-slot input{padding:5px 8px;font-size:12px;}

  /* 에러 */
  .err{font-size:13px;color:var(--red);margin-top:8px;}
  .notice{font-size:13px;color:var(--text2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;background:var(--bg2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .notice-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

  /* 로딩 */
  .loading{text-align:center;padding:60px 0;color:var(--text2);font-size:14px;}
  .spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .fade{animation:fadeUp .25s ease;}

  /* 곡 완료 표기 */
  .song-status-list{display:flex;flex-direction:column;gap:6px;}
  .song-status-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border);}
  .song-status-row.all-done{border-color:rgba(76,255,145,.3);background:var(--green-dim);}
  .song-status-row.not-done{border-color:rgba(255,92,92,.3);background:var(--red-dim);}
  .song-status-name{font-size:13px;font-weight:500;}
  .song-status-name.all-done{color:var(--green);}
  .song-status-name.not-done{color:var(--red);}

  /* 멤버 상세 모달 */
  .detail-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
  .detail-modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;animation:fadeUp .2s ease;}
  .detail-modal h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
  .detail-modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:0;}
  .detail-modal-close:hover{color:var(--text);}
  .detail-day-block{margin-bottom:14px;}
  .detail-day-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:6px;}
  .detail-slot-row{font-size:13px;color:var(--text2);padding:4px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
  .detail-impossible{color:var(--red);font-size:13px;padding:6px 10px;background:var(--red-dim);border-radius:var(--radius);margin-bottom:6px;}
  .detail-songs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
  .detail-song-tag{font-size:12px;padding:3px 10px;border-radius:99px;background:var(--accent-dim);color:var(--accent);}
  .member-name-btn{cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
  .member-name-btn:hover{opacity:.8;}

  @media(max-width:480px){
    header h1{font-size:20px;}
    .day-grid{grid-template-columns:repeat(4,1fr);}
    .card{padding:16px;}
  }
</style>
</head>
<body>
<!-- 멤버 상세 모달 -->
<div id="memberDetailOverlay" class="detail-modal-overlay" style="display:none;" onclick="closeMemberDetail(event)">
  <div class="detail-modal" id="memberDetailModal">
    <h3 id="memberDetailName"><span></span><button class="detail-modal-close" onclick="closeMemberDetailBtn()">✕</button></h3>
    <div id="memberDetailBody"></div>
  </div>
</div>

<div class="container">
  <header>
    <div class="header-label">🎸 Band Schedule</div>
    <h1>합주 시간 투표</h1>
    <p>가능한 요일과 시간대를 선택해주세요.</p>
  </header>

  <!-- 로그인 -->
  <div id="loginView" class="fade">
    <div class="card">
      <div class="card-title">본인 이름을 입력해주세요</div>
      <div class="card-sub">이름은 3글자로 입력해주세요.</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="nameInput" placeholder="예: 홍길동" maxlength="10" onkeydown="if(event.key==='Enter')login()" />
        <button class="btn btn-accent" onclick="login()" style="white-space:nowrap;">시작 →</button>
      </div>
      <!-- 원거리 체크박스 -->
      <div class="checkbox-row" id="farCheckRow" onclick="toggleFar()" style="margin-bottom:8px;">
        <div class="cb-box" id="farCb"></div>
        <div>
          <div class="cb-label">편도 2시간 30분 이상 소요</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">체크 시 출발 지역을 입력해주세요</div>
        </div>
      </div>
      <div id="farRegionWrap" style="display:none;margin-bottom:8px;">
        <input type="text" id="farRegion" placeholder="출발 지역 (예: 수원, 인천)" />
      </div>
      <!-- 이틀 이상 가능 체크박스 -->
      <div class="checkbox-row" id="multiDayCheckRow" onclick="toggleMultiDay()" style="margin-bottom:8px;">
        <div class="cb-box" id="multiDayCb"></div>
        <div>
          <div class="cb-label">이틀 이상 나올 수 있어요</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">체크 시 합주가 이틀에 나뉘어도 참여 가능</div>
        </div>
      </div>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <!-- 메인 -->
  <div id="mainView" style="display:none;">
    <div class="topbar">
      <div class="user-pill">
        <div class="avatar" id="avatarEl"></div>
        <div>
          <div style="font-size:14px;font-weight:500;display:flex;align-items:center;" id="userNameEl"></div>
          <div style="font-size:12px;color:var(--text2);">으로 접속 중</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:var(--text2);"><span class="sync-dot" id="syncDot"></span>실시간</span>
        <button class="btn btn-sm" onclick="logout()">나가기</button>
      </div>
    </div>

    <!-- 일반 부원: 단계별 투표 -->
    <div id="userFlow" style="display:none;">
      <!-- 재투표 안내 배너 -->
      <div id="revisitBanner" style="display:none;background:rgba(232,255,71,.08);border:0.5px solid rgba(232,255,71,.2);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;align-items:center;gap:8px;font-size:13px;color:var(--accent);">
        <span>✏️</span>
        <span>이전에 입력한 내용을 불러왔어요. 수정 후 다시 제출하면 업데이트됩니다.</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-steps">
          <div class="progress-step" id="ps0"></div>
          <div class="progress-step" id="ps1"></div>
          <div class="progress-step" id="ps2"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>
      </div>
      <div id="step0View"></div>
      <div id="step1View" style="display:none;"></div>
      <div id="step2View" style="display:none;"></div>
      <div id="doneMsgView" style="display:none;">
        <div class="done-card fade">
          <div style="font-size:44px;margin-bottom:16px;">🎸</div>
          <h2>투표 완료!</h2>
          <p>소중한 의견 감사합니다.<br><br>최종 합주 시간표가 확정되면<br><strong style="color:var(--text);">집부진들이 공유</strong>할 예정입니다.<br><br>조금만 기다려주세요!</p>
        </div>
      </div>
    </div>

    <!-- 집부 모드 -->
    <div id="adminFlow" style="display:none;">
      <!-- 탭 -->
      <div style="display:flex;border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px;">
        <button class="btn" id="atab0" onclick="switchAdminTab(0)" style="flex:1;border:none;border-radius:0;border-right:0.5px solid var(--border);">🎵 곡 관리</button>
        <button class="btn" id="atab1" onclick="switchAdminTab(1)" style="flex:1;border:none;border-radius:0;border-right:0.5px solid var(--border);">👥 투표 현황</button>
        <button class="btn" id="atab2" onclick="switchAdminTab(2)" style="flex:1;border:none;border-radius:0;">📅 시간표</button>
      </div>
      <div id="adminTab0"></div>
      <div id="adminTab1" style="display:none;"></div>
      <div id="adminTab2" style="display:none;"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyAVQQUffcX9oc6y0rSNX0V96ZX3Ll5Ejuw",authDomain:"echo-sound-40.firebaseapp.com",projectId:"echo-sound-40",storageBucket:"echo-sound-40.firebasestorage.app",messagingSenderId:"824454344194",appId:"1:824454344194:web:bcda623835e94790f1c11b",databaseURL:"https://echo-sound-40-default-rtdb.firebaseio.com"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const ADMIN='집부';
const DAYS=['월','화','수','목','금','토','일'];
const WEEKDAYS=['월','화','수','목','금'];
const WEEKEND=['토','일'];
const SESSIONS=['보컬','드럼','기타1','기타2','건반1','건반2','베이스'];

// 시간 옵션
function timeOptions(day){
  const isWeekend=WEEKEND.includes(day);
  const start=isWeekend?9:15;
  const end=isWeekend?22:22;
  let opts='<option value="">선택</option>';
  for(let h=start;h<=end;h++){
    opts+=`<option value="${h}:00">${h}:00</option>`;
    if(h<end) opts+=`<option value="${h}:30">${h}:30</option>`;
  }
  return opts;
}

let currentUser=null,isAdmin=false,isFar=false,farRegion='',isMultiDay=false;
let songs={},votes={},sessionExport={};
let unsubAll=[];
let step=0;
let localData={songs:[],impossibleDays:[],timeSlots:{}};
let adminTabN=0;

// 로그인 관련
let farChecked=false,multiDayChecked=false;
window.toggleFar=function(){
  farChecked=!farChecked;
  const row=document.getElementById('farCheckRow');
  const cb=document.getElementById('farCb');
  const wrap=document.getElementById('farRegionWrap');
  row.className='checkbox-row'+(farChecked?' checked-red':'');
  cb.textContent=farChecked?'✓':'';
  wrap.style.display=farChecked?'block':'none';
};
window.toggleMultiDay=function(){
  multiDayChecked=!multiDayChecked;
  const row=document.getElementById('multiDayCheckRow');
  const cb=document.getElementById('multiDayCb');
  row.className='checkbox-row'+(multiDayChecked?' checked':'');
  cb.textContent=multiDayChecked?'✓':'';
};

function login(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v){document.getElementById('loginErr').textContent='이름을 입력해주세요.';return;}
  if(farChecked&&!document.getElementById('farRegion').value.trim()){
    document.getElementById('loginErr').textContent='출발 지역을 입력해주세요.';return;
  }

  // 집부 모드는 바로 통과
  if(v===ADMIN){
    proceedLogin(v);return;
  }

  // 집부가 등록한 멤버 목록에서 이름 확인
  get(ref(db,'sched_members')).then(snap=>{
    const members=snap.val()||{};
    const memberList=Object.values(members).map(m=>m.name||m);
    if(!memberList.length){
      // 멤버 목록이 비어있으면 일단 통과 (집부가 아직 등록 안 한 경우)
      proceedLogin(v);return;
    }
    if(!memberList.includes(v)){
      document.getElementById('loginErr').innerHTML=
        `이름을 찾을 수 없어요.<br>
        <span style="font-size:12px;color:var(--text2);">이름 석 자를 정확히 입력했는지 다시 확인해주세요.<br>
        잘 기입됐는데 안 되면 <strong style="color:var(--text);">기장 홍영진 또는 양지원</strong>에게 연락해주세요.</span>`;
      return;
    }
    proceedLogin(v);
  });
}

function proceedLogin(v){
  currentUser=v;isAdmin=(v===ADMIN);
  isFar=farChecked;farRegion=document.getElementById('farRegion').value.trim();
  isMultiDay=multiDayChecked;
  document.getElementById('loginView').style.display='none';
  document.getElementById('mainView').style.display='block';
  document.getElementById('avatarEl').textContent=v.charAt(0);
  let badge=isAdmin?'<span class="admin-badge">집부</span>':'';
  if(isFar) badge+='<span class="far-badge">원거리</span>';
  if(isMultiDay&&!isFar) badge+='<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(76,255,145,.1);color:var(--green);border:0.5px solid rgba(76,255,145,.2);margin-left:4px;">이틀가능</span>';
  document.getElementById('userNameEl').innerHTML=v+badge;
  if(isAdmin){
    document.getElementById('adminFlow').style.display='block';
    startSync();
    switchAdminTab(0);
  } else {
    document.getElementById('userFlow').style.display='block';
    // 기존 투표 데이터 불러오기
    get(ref(db,`sched_votes/${currentUser}`)).then(snap=>{
      const prev=snap.val();
      if(prev){
        // 이전 입력값 복원
        localData.songs=prev.songs||[];
        localData.impossibleDays=prev.impossibleDays||[];
        localData.timeSlots=prev.timeSlots||{};
        // 원거리/이틀가능 체크 복원
        if(prev.isFar&&!isFar){
          isFar=prev.isFar;
          farRegion=prev.farRegion||'';
        }
        if(prev.isMultiDay&&!isMultiDay){
          isMultiDay=prev.isMultiDay;
        }
        // 재투표 안내 배너 표시
        document.getElementById('revisitBanner').style.display='flex';
      }
      startSync();
      setStep(0);
    });
  }
}
window.login=login;

function logout(){
  unsubAll.forEach(u=>u());unsubAll=[];
  currentUser=null;isAdmin=false;isFar=false;farChecked=false;farRegion='';isMultiDay=false;multiDayChecked=false;
  step=0;localData={songs:[],impossibleDays:[],timeSlots:{}};songs={};votes={};sessionExport={};
  document.getElementById('mainView').style.display='none';
  document.getElementById('loginView').style.display='block';
  document.getElementById('nameInput').value='';
  document.getElementById('loginErr').textContent='';
  document.getElementById('farCheckRow').className='checkbox-row';
  document.getElementById('farCb').textContent='';
  document.getElementById('farRegionWrap').style.display='none';
  document.getElementById('multiDayCheckRow').className='checkbox-row';
  document.getElementById('multiDayCb').textContent='';
  document.getElementById('userFlow').style.display='none';
  document.getElementById('revisitBanner').style.display='none';
  document.getElementById('adminFlow').style.display='none';
  document.getElementById('syncDot').classList.remove('live');
}
window.logout=logout;

function startSync(){
  document.getElementById('syncDot').classList.remove('live');
  const u1=onValue(ref(db,'sched_songs'),snap=>{
    songs=snap.val()||{};
    document.getElementById('syncDot').classList.add('live');
    if(!isAdmin) renderStep(step);
    else renderAdminTab(adminTabN);
  });
  const u2=onValue(ref(db,'sched_votes'),snap=>{
    votes=snap.val()||{};
    if(!isAdmin) renderStep(step);
    else renderAdminTab(adminTabN);
  });
  // 세션 배정 데이터 불러오기 (session_export)
  const u3=onValue(ref(db,'session_export'),snap=>{
    sessionExport=snap.val()||{};
    if(isAdmin&&Object.keys(sessionExport).length>0){
      const updates={};
      Object.entries(sessionExport).forEach(([sid,s])=>{
        const existing=songs[sid]||{};
        updates[sid]={
          title:s.title,
          sessions:{},
          createdAt:existing.createdAt||Date.now()
        };
        Object.entries(s.sessions||{}).forEach(([sessId,sessData])=>{
          if(!sessData||!sessData.active) return;
          // Firebase는 배열을 객체로 변환하므로 둘 다 처리
          let members=[];
          if(Array.isArray(sessData.members)){
            members=sessData.members.filter(m=>m);
          } else if(sessData.members&&typeof sessData.members==='object'){
            members=Object.values(sessData.members).filter(m=>m);
          }
          if(members.length){
            updates[sid].sessions[sessId]=members.join(', ');
          }
        });
      });
      set(ref(db,'sched_songs'),updates);
    }
    if(isAdmin) renderAdminTab(adminTabN);
  });
  unsubAll=[u1,u2,u3];
}

// ── 진행 단계 ──
function setStep(n){
  step=n;
  [0,1,2].forEach(i=>{
    document.getElementById('step'+i+'View').style.display=i===n?'block':'none';
  });
  document.getElementById('doneMsgView').style.display='none';
  updateProgress(n);
  renderStep(n);
}

function updateProgress(n){
  const labels=['1단계: 참여 곡 확인','2단계: 불가능한 요일 선택','3단계: 가능 시간대 입력'];
  [0,1,2].forEach(i=>{
    const el=document.getElementById('ps'+i);
    el.className='progress-step'+(i<n?' done':i===n?' active':'');
  });
  document.getElementById('progressLabel').textContent=labels[n]||'완료';
}

function renderStep(n){
  if(n===0) renderStep0();
  else if(n===1) renderStep1();
  else if(n===2) renderStep2();
}

      <div id="slots_${d}" class="time-slot-list">${slots.map((s,i)=>slotHtml(d,i,s)).join('')}</div>

    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn" style="flex:1;" onclick="setStep(1)">← 이전</button>

    </div>
    <div class="err" id="step2err"></div>
  </div>`;

function slotHtml(day,idx,slot){
  const isWeekend=WEEKEND.includes(day);
  const startH=isWeekend?9:15;
  const endH=22;
  function opts(selected){
    let o='<option value="">선택</option>';
    for(let h=startH;h<=endH;h++){
      o+=`<option value="${h}:00"${selected===h+':00'?' selected':''} >${h}:00</option>`;
      if(h<endH) o+=`<option value="${h}:30"${selected===h+':30'?' selected':''} >${h}:30</option>`;
    }
    return o;
  }
  return`<div class="time-slot" id="slot_${day}_${idx}">
    <select onchange="updateSlot('${day}',${idx},'start',this.value)">${opts(slot.start||'')}</select>
    <span class="time-slot-sep">~</span>
    <select onchange="updateSlot('${day}',${idx},'end',this.value)">${opts(slot.end||'')}</select>
    <button class="btn btn-sm btn-danger" onclick="removeSlot('${day}',${idx})" style="flex-shrink:0;">✕</button>
  </div>`;
}

window.addSlot=function(day){
  if(!localData.timeSlots[day]) localData.timeSlots[day]=[];
  localData.timeSlots[day].push({start:'',end:''});
  renderStep2();
};
window.removeSlot=function(day,idx){
  localData.timeSlots[day].splice(idx,1);
  renderStep2();
};
window.updateSlot=function(day,idx,key,val){
  if(!localData.timeSlots[day]) localData.timeSlots[day]=[];
  if(!localData.timeSlots[day][idx]) localData.timeSlots[day][idx]={};
  localData.timeSlots[day][idx][key]=val;
};

// 제출
async function submitVote(){
  const possibleDays=DAYS.filter(d=>!localData.impossibleDays.includes(d));
  // 검증: 가능 요일 중 시간대 미입력 확인
  let hasSlot=false;
  for(const d of possibleDays){
    const slots=(localData.timeSlots[d]||[]).filter(s=>s.start&&s.end);
    if(slots.length>0){hasSlot=true;break;}
  }
  if(!hasSlot){document.getElementById('step2err').textContent='최소 하나의 가능 시간대를 입력해주세요.';return;}

  // 슬롯 유효성
  for(const d of possibleDays){
    const slots=(localData.timeSlots[d]||[]).filter(s=>s.start||s.end);
    for(const s of slots){
      if(!s.start||!s.end){document.getElementById('step2err').textContent='시작/끝 시간을 모두 선택해주세요.';return;}
    }
  }

  const payload={
    name:currentUser,
    isFar,farRegion,
    isMultiDay,
    songs:localData.songs,
    impossibleDays:localData.impossibleDays,
    timeSlots:Object.fromEntries(
      Object.entries(localData.timeSlots).map(([d,slots])=>[d,slots.filter(s=>s.start&&s.end)])
    ),
    submittedAt:Date.now()
  };
  await set(ref(db,`sched_votes/${currentUser}`),payload);

  // 완료 화면
  [0,1,2].forEach(i=>document.getElementById('step'+i+'View').style.display='none');
  document.getElementById('doneMsgView').style.display='block';
  updateProgress(3);
}

const SESSION_NAMES=['vocal','drum','guitar1','guitar2','keys1','keys2','bass'];
const SESSION_LABELS={vocal:'보컬',drum:'드럼',guitar1:'기타1',guitar2:'기타2',keys1:'건반1',keys2:'건반2',bass:'베이스'};

function songAdminCard(s){
  const sessions=s.sessions||{};
  const sessionHtml=SESSION_NAMES.map(sessId=>{
    const val=sessions[sessId];
    // null, 빈값, 없음 제외
    const isEmpty=!val||val==='없음'||val.trim()==='';
    return`<div style="background:var(--bg4);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">${SESSION_LABELS[sessId]}</div>
      <div style="font-size:13px;${isEmpty?'color:var(--text3);':'color:var(--text);font-weight:500;'}">${isEmpty?'—':val}</div>
    </div>`;
  }).join('');

  return`<div style="background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:14px;font-weight:600;">${s.title}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteSong('${s.id}')">삭제</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;">${sessionHtml}</div>
  </div>`;
}

function generateSchedules(songArr,voteArr){
  const farVoters=voteArr.filter(v=>v.isFar);

  // ── 곡별 참여자 정보 (없음 제외) ──
  const songParticipants={};
  songArr.forEach(s=>{
    const sessMembers=validMembers(s.sessions);
    const voters=voteArr.filter(v=>sessMembers.includes(v.name));
    const hasFar=voters.some(v=>v.isFar);
    songParticipants[s.id]={title:s.title,members:sessMembers,voters,hasFar,song:s};
  });

  // ── 후보 요일: 최소 한 곡이라도 배치 가능한 요일 ──
  const candidateDays=DAYS.filter(d=>{
    return songArr.some(s=>{
      const sp=songParticipants[s.id];
      if(!sp||!sp.members.length) return true;
      return sp.members.every(name=>{
        const v=voteArr.find(vt=>vt.name===name);
        if(!v) return true;
        return !(v.impossibleDays||[]).includes(d);
      });
    });
  });

  const useDays=candidateDays.length?candidateDays:DAYS;

  // ── 요일 조합 생성 (2일~최대 7일, 모든 곡 커버될 때까지 늘림) ──
  function getCombos(days, size){
    const result=[];
    function pick(start, combo){
      if(combo.length===size){result.push([...combo]);return;}
      for(let i=start;i<days.length;i++){
        combo.push(days[i]);
        pick(i+1,combo);
        combo.pop();
      }
    }
    pick(0,[]);
    return result;
  }

  let bestSchedules=[];
  let bestCoverage=0;

  // 2일부터 최대 7일까지 시도, 모든 곡 커버되면 중단
  for(let size=2;size<=Math.min(7,useDays.length);size++){
    const combos=getCombos(useDays,size);
    const thisRound=[];

    combos.forEach(combo=>{
      const sc=buildSchedule(combo,songArr,voteArr,songParticipants,farVoters);
      if(sc) thisRound.push(sc);
    });

    if(!thisRound.length) continue;

    // 이 라운드에서 최대 커버 곡 수
    const maxCov=Math.max(...thisRound.map(s=>s.coveredSongs));
    if(maxCov>bestCoverage){
      bestCoverage=maxCov;
      bestSchedules=thisRound;
    }

    // 모든 곡 커버하는 시간표가 있으면 중단
    if(maxCov>=songArr.length) break;
  }

  // 1일짜리도 시도 (백업)
  if(!bestSchedules.length){
    useDays.forEach(day=>{
      const sc=buildSchedule([day],songArr,voteArr,songParticipants,farVoters);
      if(sc) bestSchedules.push(sc);
    });
  }

  // ── 점수 기준 정렬 ──
  bestSchedules.sort((a,b)=>{
    const sA=a.coveredSongs*10 - a.days.length*3 + a.farScore*2;
    const sB=b.coveredSongs*10 - b.days.length*3 + b.farScore*2;
    return sB-sA;
  });

  // ── 미배치 곡 계산 (최고 시간표 기준) ──
  const bestSc=bestSchedules[0];
  const assignedTitles=new Set(bestSc?.days.flatMap(d=>d.slots.map(sl=>sl.song))||[]);
  const unassignedSongs=songArr.filter(s=>!assignedTitles.has(s.title));

  return {schedules:bestSchedules.slice(0,4), unassignedSongs};
}

function buildSchedule(days,songArr,voteArr,songParticipants,farVoters){
  const schedule={days:[],coveredSongs:0,farScore:0,label:days.join('·')+'요일'};
  const assigned=new Set();

  // 원거리 부원 이름 목록
  const farNames=new Set(farVoters.map(v=>v.name));
  // 이틀 이상 가능한 부원 이름 목록
  const multiDayNames=new Set(voteArr.filter(v=>v.isMultiDay).map(v=>v.name));

  days.forEach(day=>{
    const isWeekend=WEEKEND.includes(day);
    const dayStartMin=isWeekend?9*60:15*60;
    const dayHardEnd=isWeekend?22*60:22*60;
    const normalEndMin=isWeekend?19*60:22*60;
    const farEndMin=19*60;
    const weekendPreferStart=12*60;

    const daySongs=songArr.filter(s=>{
      if(assigned.has(s.id)) return false;
      const sp=songParticipants[s.id];
      if(!sp||!sp.members.length) return true;
      return sp.members.every(name=>{
        const v=voteArr.find(vt=>vt.name===name);
        if(!v) return true;
        if((v.impossibleDays||[]).includes(day)) return false;
        const daySlots=(v.timeSlots||{})[day]||[];
        if(!daySlots.length) return false;
        return daySlots.some(ts=>{
          if(!ts.start||!ts.end) return false;
          const [sh,sm]=ts.start.split(':').map(Number);
          const [eh,em]=ts.end.split(':').map(Number);
          return sh*60+sm<dayHardEnd && eh*60+em>dayStartMin;
        });
      });
    });

    if(!daySongs.length) return;

    const totalSongs=daySongs.length;

    // ── 합주 시간 동적 결정 ──
    // 가용 시간 / 곡 수로 1곡당 최적 시간 계산
    // 경우의 수: 60 / 70 / 75 / 80 / 90분
    const startCursor=isWeekend?Math.max(dayStartMin,weekendPreferStart):dayStartMin;
    const availableMin=normalEndMin-startCursor;
    const rawPerSong=availableMin/totalSongs;
    const DURATIONS=[90,80,75,70,60];
    // 가용 시간 내에서 최대한 긴 슬롯 선택
    let slotDur=DURATIONS.find(d=>d*totalSongs<=availableMin)||60;

    let cursor=startCursor;

    const slots=[];

    // ── 배치 우선순위 4단계 분류 ──
    // 1순위: 원거리 + 이틀 불가 (하루만 올 수 있음) → 최우선
    // 2순위: 원거리 + 이틀 가능 → 원거리 차순위
    // 3순위: 일반 (원거리도 이틀가능도 아님)
    // 4순위: 이틀가능만 (원거리 아님) → 가장 유연하므로 후순위
    const tier1=daySongs.filter(s=>{
      const sp=songParticipants[s.id];
      return sp.voters.some(v=>farNames.has(v.name)&&!multiDayNames.has(v.name));
    });
    const tier2=daySongs.filter(s=>{
      const sp=songParticipants[s.id];
      return !tier1.includes(s)&&sp.voters.some(v=>farNames.has(v.name)&&multiDayNames.has(v.name));
    });
    const tier4=daySongs.filter(s=>{
      const sp=songParticipants[s.id];
      return !tier1.includes(s)&&!tier2.includes(s)&&sp.voters.some(v=>!farNames.has(v.name)&&multiDayNames.has(v.name));
    });
    const tier3=daySongs.filter(s=>!tier1.includes(s)&&!tier2.includes(s)&&!tier4.includes(s));
    const orderedSongs=[...tier1,...tier2,...tier3,...tier4];

    orderedSongs.forEach(s=>{
      const sp=songParticipants[s.id];
      const hasFarOnly=sp.voters.some(v=>farNames.has(v.name)&&!multiDayNames.has(v.name));
      const hasFarMulti=!hasFarOnly&&sp.voters.some(v=>farNames.has(v.name)&&multiDayNames.has(v.name));
      const hasMultiOnly=!hasFarOnly&&!hasFarMulti&&sp.voters.some(v=>!farNames.has(v.name)&&multiDayNames.has(v.name));
      const songEndLimit=(hasFarOnly||hasFarMulti)?farEndMin:normalEndMin;

      if(cursor+slotDur>songEndLimit){
        if(hasFarOnly||hasFarMulti) return;
        if(cursor+slotDur>dayHardEnd) return;
      }

      // 전원 가능 여부: 투표자는 실제 시간 확인, 미투표자는 가능으로 간주
      const canPlace=!sp.members.length||sp.members.every(name=>{
        const v=voteArr.find(vt=>vt.name===name);
        if(!v) return true; // 미투표자 → 가능으로 간주
        if((v.impossibleDays||[]).includes(day)) return false;
        const daySlots=(v.timeSlots||{})[day]||[];
        return daySlots.some(ts=>{
          if(!ts.start||!ts.end) return false;
          const [sh,sm]=ts.start.split(':').map(Number);
          const [eh,em]=ts.end.split(':').map(Number);
          return sh*60+sm<=cursor && eh*60+em>=cursor+slotDur;
        });
      });

      if(!canPlace) return;

      const fmt=n=>String(n).padStart(2,'0');
      const startH=Math.floor(cursor/60),startM=cursor%60;
      const endMin=cursor+slotDur;
      const endH=Math.floor(endMin/60),endM=endMin%60;
      slots.push({
        time:`${fmt(startH)}:${fmt(startM)}~${fmt(endH)}:${fmt(endM)}`,
        song:s.title,
        members:validMembers(s.sessions).join(', '),
        duration:slotDur
      });
      assigned.add(s.id);
      cursor+=slotDur;
    });

    if(slots.length) schedule.days.push({day,slots,slotDur});
  });

  schedule.coveredSongs=assigned.size;

  // ── 원거리 점수 계산 ──
  // 🚌(하루만) 부원이 참여하는 곡들이 최소 날짜에 몰릴수록 점수 높음
  // 🚌📅(이틀가능)는 하루 집중 필요 없으므로 점수 계산 제외
  const farOnlyVoters=farVoters.filter(v=>!multiDayNames.has(v.name));
  if(farOnlyVoters.length&&schedule.days.length){
    const farOnlyDayCount=schedule.days.filter(d=>
      d.slots.some(sl=>sl.song.includes('🚌')&&!sl.song.includes('🚌📅'))
    ).length;
    schedule.farScore=Math.max(0,schedule.days.length-farOnlyDayCount+1)*farOnlyVoters.length;
  }

  return schedule.days.length?schedule:null;
}

function generateFallbackSchedule(songArr,voteArr,songParticipants){
  const sc={days:[],coveredSongs:0,farScore:0,label:'기본 시간표 (데이터 부족)'};
  const farVoters=voteArr.filter(v=>v.isFar);
  let cursor=12*60; // 주말 기본 12:00 시작
  const slots=[];
  const slotDur=90;
  songArr.slice(0,6).forEach(s=>{
    const sp=songParticipants[s.id];
    const farMark=sp&&sp.hasFar?' 🚌':'';
    const endMin=cursor+slotDur;
    const fmt=n=>String(n).padStart(2,'0');
    slots.push({
      time:`${fmt(Math.floor(cursor/60))}:${fmt(cursor%60)}~${fmt(Math.floor(endMin/60))}:${fmt(endMin%60)}`,
      song:s.title+farMark,
      members:validMembers(s.sessions).join(', '),
      duration:slotDur
    });
    cursor+=slotDur;
  });
  sc.days.push({day:'토',slots,slotDur});
  sc.coveredSongs=slots.length;
  return sc;
}

function timetableCardHtml(sc,isRecommended,idx){
  const farVoters=Object.values(votes).filter(v=>v.isFar);
  const farNote=farVoters.length?`<div style="font-size:12px;color:#ff6b6b;margin-top:4px;">🚌 원거리 고려: ${farVoters.map(v=>v.name+(v.farRegion?' ('+v.farRegion+')':'')).join(', ')}</div>`:'';

  // ── 달력형 표 생성 ──
  // 모든 요일 포함 (합주 없는 요일은 공란)
  const allDays=DAYS; // 월~일 전체
  const activeDays=sc.days.map(d=>d.day);

  // ── 시간 범위 계산 ──
  const hasWeekend=sc.days.some(d=>WEEKEND.includes(d.day));
  const fixedStart=hasWeekend?9*60:15*60;
  const fixedEnd=hasWeekend?22*60:22*60;
  // 실제 배치된 슬롯의 끝 시간도 고려 (잘림 방지)
  let actualEnd=fixedEnd;
  sc.days.forEach(d=>{
    d.slots.forEach(s=>{
      const [eh,em]=s.time.split('~')[1].split(':').map(Number);
      actualEnd=Math.max(actualEnd,eh*60+em);
    });
  });
  const minMin=fixedStart;
  const maxMin=actualEnd;

  const timeSlots=[];
  for(let t=minMin;t<maxMin;t+=15) timeSlots.push(t);

  // 요일별 슬롯 맵
  const daySlotMap={};
  allDays.forEach(day=>{
    daySlotMap[day]={};
    const d=sc.days.find(d=>d.day===day);
    if(!d) return;
    d.slots.forEach(s=>{
      const [sh,sm]=s.time.split('~')[0].split(':').map(Number);
      const [eh,em]=s.time.split('~')[1].split(':').map(Number);
      const startMin=sh*60+sm;
      const endMin=eh*60+em;
      const rowspan=(endMin-startMin)/15;
      daySlotMap[day][startMin]={...s,rowspan,endMin};
    });
  });

  // 헤더 (합주 있는 요일은 초록, 없는 요일은 회색)
  const headerCells=allDays.map(d=>{
    const hasSchedule=activeDays.includes(d);
    return`<th style="background:${hasSchedule?'#4a7c4e':'#444'};color:#fff;padding:10px 8px;border:1px solid ${hasSchedule?'#5a9c5e':'#555'};font-size:13px;font-weight:700;text-align:center;min-width:90px;">${d}요일</th>`;
  }).join('');

  // 바디
  const skipMap={};
  allDays.forEach(d=>{ skipMap[d]=0; });

  const bodyRows=timeSlots.map(t=>{
    const fmt=n=>String(n).padStart(2,'0');
    const h=Math.floor(t/60),m=t%60;
    const timeLabel=`${fmt(h)}:${fmt(m)}`;
    const isHalfHour=m===0||m===30;

    const cells=allDays.map(day=>{
      const hasSchedule=activeDays.includes(day);
      if(!hasSchedule){
        // 합주 없는 요일: 전체 공란 (rowspan으로 합치지 않고 개별 셀)
        return`<td style="background:#f5f5f5;border:1px solid #e0e0e0;height:28px;"></td>`;
      }
      if(skipMap[day]>0){ skipMap[day]--; return ''; }
      const slot=daySlotMap[day][t];
      if(slot){
        skipMap[day]=slot.rowspan-1;
        return`<td rowspan="${slot.rowspan}" style="background:#e8f5e9;color:#1a1a1a;padding:8px 10px;border:1px solid #c8e6c9;text-align:center;vertical-align:middle;font-size:13px;font-weight:700;line-height:1.4;">${slot.song}</td>`;
      }
      return`<td style="background:#fff;border:1px solid #e0e0e0;height:28px;"></td>`;
    }).join('');

    return`<tr>
      <td style="background:${isHalfHour?'#4a7c4e':'#6aaa6e'};color:#fff;padding:4px 10px;border:1px solid #5a9c5e;font-size:12px;font-family:'DM Mono',monospace;white-space:nowrap;text-align:right;font-weight:${isHalfHour?'700':'400'};">${timeLabel}</td>
      ${cells}
    </tr>`;
  }).join('');
  const captureId=`capture_${idx}`;

  return`<div class="timetable-card${isRecommended?' recommended':''}" id="timetable_${idx}">
    <div class="timetable-header">
      <div>
        <div class="timetable-title">${isRecommended?'⭐ ':''} ${sc.label} <span style="font-size:12px;color:var(--text2);">(${sc.coveredSongs}곡)</span></div>
        ${isRecommended?'<div style="font-size:12px;color:var(--accent);margin-top:2px;">추천 시간표</div>':''}
        ${farNote}
      </div>
      <div style="display:flex;gap:6px;align-items:flex-start;">
        ${isRecommended?'<span class="recommend-badge">추천</span>':''}
        <button class="save-img-btn" onclick="saveAsImage('${captureId}','시간표_${sc.label}')">🖼 이미지 저장</button>
      </div>
    </div>
    <div id="${captureId}" style="background:#fff;border-radius:10px;padding:20px;overflow-x:auto;">
      <div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;font-family:'Noto Sans KR',sans-serif;">🎸 밴드부 합주 시간표</div>
      <div style="font-size:12px;color:#666;margin-bottom:14px;font-family:'Noto Sans KR',sans-serif;">${sc.label} · ${sc.coveredSongs}곡${isRecommended?' ⭐ 추천':''}</div>
      <table style="border-collapse:collapse;font-family:'Noto Sans KR',sans-serif;width:100%;">
        <thead>
          <tr>
            <th style="background:#4a7c4e;color:#fff;padding:10px 12px;border:1px solid #5a9c5e;font-size:13px;text-align:center;white-space:nowrap;">시간</th>
            ${headerCells}
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
      <div style="font-size:11px;color:#999;margin-top:10px;font-family:'Noto Sans KR',sans-serif;">※ 투표 데이터 기반 자동 생성 시간표입니다.</div>
    </div>
  </div>`;
}

window.saveAsImage=async function(elId,filename){
  if(!window.html2canvas){alert('잠시 후 다시 시도해주세요.');return;}
  const el=document.getElementById(elId);
  const canvas=await html2canvas(el,{
    backgroundColor:'#ffffff',
    scale:2,
    useCORS:true,
    logging:false
  });
  const a=document.createElement('a');
  a.download=(filename||'시간표')+'.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
};
